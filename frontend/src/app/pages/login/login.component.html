    <div class="login-container">
      <mat-card class="login-card">
        <mat-card-header>
          <mat-card-title>School Project Management</mat-card-title>
          <mat-card-subtitle>Sign in to continue</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
          <!-- Keycloak Login Button -->
          <div class="keycloak-login">
            <button 
              mat-raised-button 
              color="primary" 
              (click)="loginWithKeycloak()"
              class="full-width keycloak-button">
              <mat-icon>vpn_key</mat-icon>
              <span>Sign in with Keycloak</span>
            </button>
          </div>

          <div class="divider">
            <span>OR</span>
          </div>

          <!-- Mock Login Form (for development) -->
          <form (ngSubmit)="login()" #loginForm="ngForm">
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Username</mat-label>
              <input 
                matInput 
                [(ngModel)]="credentials.username" 
                name="username"
                required
                autocomplete="username">
              <mat-icon matPrefix>person</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Password</mat-label>
              <input 
                matInput 
                type="password"
                [(ngModel)]="credentials.password" 
                name="password"
                required
                autocomplete="current-password">
              <mat-icon matPrefix>lock</mat-icon>
            </mat-form-field>

            <div class="error-message" *ngIf="errorMessage">
              <mat-icon>error</mat-icon>
              {{ errorMessage }}
            </div>

            <button 
              mat-raised-button 
              color="accent" 
              type="submit"
              class="full-width"
              [disabled]="loading || !loginForm.valid">
              <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
              <span *ngIf="!loading">Sign In (Mock)</span>
            </button>
          </form>

          <div class="demo-accounts">
            <p class="demo-title">Demo Accounts (Mock):</p>
            <div class="demo-account" *ngFor="let demo of demoAccounts">
              <strong>{{ demo.role }}:</strong> {{ demo.username }} / password
            </div>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
